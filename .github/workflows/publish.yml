name: Publish satchange to PyPI

# Publishes on a GitHub Release, or manually. Uses PyPI Trusted Publishing
# (OIDC) — no API token stored anywhere.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/satchange
    permissions:
      id-token: write        # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Don't fail if this version is already on PyPI (e.g. release re-runs,
          # or backfilled GitHub releases for versions published out-of-band).
          skip-existing: true
